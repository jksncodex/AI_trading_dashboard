symbol: "BTC/USDT"
timeframe: 1min

data:
    source: "synthetic"
    ccxt_exchange: "binance"
    synthetic_interval_seconds: 1.0
    synthetic_start_price: 30000.0
    synthetic_seed: 42


strategy:
    name: "ma_crossover"
    fast_period: 5
    slow_period: 20

risk:
    starting_cash: 10000.0
    risk_fraction: 0.02
    max_position_value: 1000.0
    max_open_positions: 1
    daily_loss_limit_pct: 0.05

execution:
    mode: "paper"
    fee_pct: 0.001
    slippage_pct: 0.0005

server:
    host: "127.0.0.1"
    port: "8000"

database:
    path: "trading.db"